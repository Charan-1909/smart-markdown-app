name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. Backend Tests (Runs immediately)
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Pytest
        # Simulating a 24-second test run
        run: echo "Running backend tests..." && sleep 24

  # 2. Frontend Tests (Runs immediately, parallel to backend)
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run UI Tests
        # Simulating a 1m 12s test run
        run: echo "Running frontend tests..." && sleep 72

  # 3. Docker Build (Waits for BOTH tests to pass)
  docker-build:
    name: Docker Build
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Image
        # Simulating a 45-second Docker build
        run: echo "Building Docker container..." && sleep 45

  # 4. Deploy (Waits for Docker Build to finish)
  deploy:
    name: Deploy
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud
        # Simulating a 3-second deployment trigger
        run: echo "Triggering deployment..." && sleep 3
